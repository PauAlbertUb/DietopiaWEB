<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra guiada – Dietopia</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    /* ---- Guided shopping styles ---- */
    .guided-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      padding: var(--space-6) 0 var(--space-16);
    }

    /* Route banner */
    .route-banner {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-8);
      margin-bottom: var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
    }

    .route-banner h2 {
      color: #fff;
      font-size: var(--text-2xl);
      font-weight: 800;
      margin-bottom: var(--space-1);
    }

    .route-banner p {
      color: rgba(255,255,255,0.85);
      font-size: var(--text-sm);
    }

    .route-stats {
      display: flex;
      gap: var(--space-5);
    }

    .route-stat {
      text-align: center;
    }

    .route-stat-value {
      font-size: var(--text-2xl);
      font-weight: 800;
    }

    .route-stat-label {
      font-size: var(--text-xs);
      color: rgba(255,255,255,0.8);
    }

    /* Supermarket selector */
    .supermarket-tabs {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-6);
    }

    .supermarket-tab {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      border: 2px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-weight: 600;
      font-size: var(--text-sm);
    }

    .supermarket-tab:hover {
      border-color: var(--color-primary);
    }

    .supermarket-tab.active {
      border-color: var(--color-primary);
      background: var(--color-primary-bg);
      color: var(--color-primary-dark);
    }

    .supermarket-tab .count-badge {
      background: var(--color-primary);
      color: #fff;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .supermarket-tab:not(.active) .count-badge {
      background: var(--color-bg-alt);
      color: var(--color-text-muted);
    }

    /* Section within supermarket */
    .supermarket-section {
      margin-bottom: var(--space-8);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }

    .aisle-label {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 700;
    }

    /* Check list item */
    .check-list-item {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-3);
      transition: all var(--transition-fast);
      cursor: pointer;
    }

    .check-list-item:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-sm);
    }

    .check-list-item.checked {
      background: var(--color-bg-alt);
      opacity: 0.7;
    }

    .check-list-item.checked .item-name-check {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    /* Custom checkbox */
    .custom-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition-fast);
      font-size: 0.75rem;
    }

    .check-list-item.checked .custom-checkbox {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    .item-details {
      flex: 1;
      min-width: 0;
    }

    .item-name-check {
      font-weight: 600;
      font-size: var(--text-sm);
    }

    .item-meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      display: flex;
      gap: var(--space-3);
      margin-top: 2px;
    }

    .item-price-check {
      font-weight: 700;
      color: var(--color-primary);
      flex-shrink: 0;
    }

    /* Progress tracker */
    .progress-tracker {
      position: sticky;
      top: var(--navbar-height);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-3) 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }

    .progress-tracker .container {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .pt-label {
      font-weight: 600;
      font-size: var(--text-sm);
    }

    .pt-count {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .pt-bar-wrapper {
      flex: 1;
      min-width: 100px;
    }

    /* Finish button area */
    .finish-area {
      text-align: center;
      padding: var(--space-8) 0;
    }

    .finish-card {
      background: var(--color-primary-bg);
      border: 2px solid var(--color-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      max-width: 400px;
      margin: 0 auto;
      display: none;
    }

    .finish-card.show {
      display: block;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="guided-page">

  <!-- Navbar -->
  <nav class="navbar">
    <div id="main-navbar"></div>
  </nav>

  <!-- Progress tracker (sticky) -->
  <div class="progress-tracker">
    <div class="container">
      <span class="pt-label">🛒 Progreso:</span>
      <div class="pt-bar-wrapper">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="shopping-progress-bar" style="width:0%"></div>
        </div>
      </div>
      <span class="pt-count" id="pt-count">0 / 0</span>
      <button class="btn btn-sm btn-primary" onclick="checkAll()">Marcar todo ✓</button>
    </div>
  </div>

  <main class="main-content">
    <div class="container">

      <!-- Route banner -->
      <div class="route-banner">
        <div>
          <h2>🗺️ Ruta de compra optimizada</h2>
          <p>Productos agrupados por supermercado y sección para minimizar tiempo</p>
        </div>
        <div class="route-stats">
          <div class="route-stat">
            <div class="route-stat-value" id="route-items">0</div>
            <div class="route-stat-label">artículos</div>
          </div>
          <div class="route-stat">
            <div class="route-stat-value" id="route-total">€0</div>
            <div class="route-stat-label">estimado</div>
          </div>
          <div class="route-stat">
            <div class="route-stat-value" id="route-time">~25</div>
            <div class="route-stat-label">min aprox.</div>
          </div>
        </div>
      </div>

      <!-- Supermarket tabs -->
      <div class="supermarket-tabs" id="supermarket-tabs">
        <!-- Rendered by JS -->
      </div>

      <!-- Shopping list per supermarket -->
      <div id="guided-list">
        <!-- Rendered by JS -->
      </div>

      <!-- Finish area -->
      <div class="finish-area">
        <div class="finish-card" id="finish-card">
          <div style="font-size:3rem; margin-bottom:var(--space-4);">🎉</div>
          <h3 style="font-size:var(--text-2xl); font-weight:800; margin-bottom:var(--space-3);">¡Compra completada!</h3>
          <p style="color:var(--color-text-muted); margin-bottom:var(--space-6);">Has comprado todos los ingredientes para tu dieta semanal. ¡A cocinar!</p>
          <div style="display:flex; gap:var(--space-3); justify-content:center; flex-wrap:wrap;">
            <a href="diet-view.html" class="btn btn-primary">🥗 Ver mi dieta</a>
            <a href="dashboard.html" class="btn btn-outline">Volver al inicio</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="dietopia-toast"></div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    /**
     * Guided shopping page logic
     * Groups items by supermarket and section, with checkboxes
     */

    // State
    let guidedItems = [];
    let activeSupermarket = "all";

    // Distribution of items across supermarkets (mock assignment)
    const SUPERMARKET_ASSIGNMENT = {
      "Frutas y Verduras": "mercadona",
      "Proteínas": "mercadona",
      "Cereales y Legumbres": "lidl",
      "Despensa": "alcampo",
    };

    // Aisle mapping
    const AISLE_MAP = {
      "Frutas y Verduras": { aisle: "Pasillo 1 · Frutas y verduras", emoji: "🥦" },
      "Proteínas": { aisle: "Pasillo 3 · Carnes y pescados", emoji: "🍗" },
      "Cereales y Legumbres": { aisle: "Pasillo 5 · Pasta y legumbres", emoji: "🌾" },
      "Despensa": { aisle: "Pasillo 7 · Aceites y conservas", emoji: "🫙" },
    };

    document.addEventListener("DOMContentLoaded", () => {
      if (!Storage.get("loggedIn")) {
        window.location.href = "login.html";
        return;
      }

      renderNavbar("shopping");

      // Load shopping list (use optimized one if available)
      const saved = Storage.get("shoppingList");
      const source = saved || window.DietopiaData.SHOPPING_LIST;

      // Only include items not owned and not removed
      guidedItems = source
        .filter((i) => !i.owned && !i.removed)
        .map((i) => ({
          ...i,
          checked: false,
          supermarket: SUPERMARKET_ASSIGNMENT[i.category] || "mercadona",
        }));

      // Update route banner
      const total = guidedItems.reduce((s, i) => s + i.price, 0);
      document.getElementById("route-items").textContent = guidedItems.length;
      document.getElementById("route-total").textContent = "€" + total.toFixed(2);
      document.getElementById("route-time").textContent = "~" + Math.max(15, Math.round(guidedItems.length * 1.2));

      renderSupermarketTabs();
      renderGuidedList();
      updateProgress();
    });

    // ---- Render supermarket tabs ----
    function renderSupermarketTabs() {
      const { SUPERMARKETS } = window.DietopiaData;
      const tabs = document.getElementById("supermarket-tabs");
      tabs.innerHTML = "";

      // "All" tab
      const allTab = document.createElement("div");
      allTab.className = "supermarket-tab active";
      allTab.dataset.sm = "all";
      allTab.innerHTML = `🛒 Todos los supermercados <span class="count-badge">${guidedItems.length}</span>`;
      allTab.addEventListener("click", () => setActiveSupermarket("all", allTab));
      tabs.appendChild(allTab);

      // Individual supermarket tabs
      SUPERMARKETS.forEach((sm) => {
        const count = guidedItems.filter((i) => i.supermarket === sm.id).length;
        if (count === 0) return;

        const tab = document.createElement("div");
        tab.className = "supermarket-tab";
        tab.dataset.sm = sm.id;
        tab.innerHTML = `${sm.emoji} ${sm.name} <span class="count-badge">${count}</span>`;
        tab.addEventListener("click", () => setActiveSupermarket(sm.id, tab));
        tabs.appendChild(tab);
      });
    }

    // ---- Set active supermarket ----
    function setActiveSupermarket(id, el) {
      activeSupermarket = id;
      document.querySelectorAll(".supermarket-tab").forEach((t) => t.classList.remove("active"));
      el.classList.add("active");
      renderGuidedList();
    }

    // ---- Render guided list ----
    function renderGuidedList() {
      const container = document.getElementById("guided-list");
      container.innerHTML = "";

      const { SUPERMARKETS } = window.DietopiaData;

      const supermarketsToShow =
        activeSupermarket === "all"
          ? SUPERMARKETS.map((s) => s.id)
          : [activeSupermarket];

      supermarketsToShow.forEach((smId) => {
        const smData = SUPERMARKETS.find((s) => s.id === smId) || {
          name: smId,
          emoji: "🏪",
        };
        const smItems = guidedItems.filter((i) => i.supermarket === smId);
        if (smItems.length === 0) return;

        // Group by category/aisle
        const categories = [...new Set(smItems.map((i) => i.category))];

        const smSection = document.createElement("div");
        smSection.className = "supermarket-section";

        // Supermarket header
        const smHeader = document.createElement("div");
        smHeader.className = "section-header";
        smHeader.innerHTML = `
          <h3 style="font-size:var(--text-xl); font-weight:800; display:flex; align-items:center; gap:8px;">
            ${smData.emoji} ${smData.name}
          </h3>
          <span class="badge badge-green">${smItems.length} productos · €${smItems.reduce((s, i) => s + i.price, 0).toFixed(2)}</span>
        `;
        smSection.appendChild(smHeader);

        // Category aisles
        categories.forEach((cat) => {
          const catItems = smItems.filter((i) => i.category === cat);
          const aisleInfo = AISLE_MAP[cat] || { aisle: cat, emoji: "📦" };

          const catDiv = document.createElement("div");
          catDiv.style.marginBottom = "var(--space-5)";

          catDiv.innerHTML = `
            <div style="margin-bottom:var(--space-3);">
              <span class="aisle-label">${aisleInfo.emoji} ${aisleInfo.aisle}</span>
            </div>
          `;

          const itemList = document.createElement("div");
          catItems.forEach((item) => {
            const el = buildCheckItem(item);
            itemList.appendChild(el);
          });
          catDiv.appendChild(itemList);
          smSection.appendChild(catDiv);
        });

        container.appendChild(smSection);
      });
    }

    // ---- Build a checkable item ----
    function buildCheckItem(item) {
      const el = document.createElement("div");
      el.className = "check-list-item" + (item.checked ? " checked" : "");
      el.id = "guided-item-" + item.id;
      el.innerHTML = `
        <div class="custom-checkbox">${item.checked ? "✓" : ""}</div>
        <div style="font-size:1.3rem;">${item.emoji}</div>
        <div class="item-details">
          <div class="item-name-check">${item.name}</div>
          <div class="item-meta">
            <span>${item.qty}</span>
          </div>
        </div>
        <div class="item-price-check">€${item.price.toFixed(2)}</div>
      `;
      el.addEventListener("click", () => toggleItem(item.id));
      return el;
    }

    // ---- Toggle item checked state ----
    function toggleItem(id) {
      const item = guidedItems.find((i) => i.id === id);
      if (!item) return;
      item.checked = !item.checked;

      // Update the DOM element
      const el = document.getElementById("guided-item-" + id);
      if (el) {
        el.className = "check-list-item" + (item.checked ? " checked" : "");
        el.querySelector(".custom-checkbox").textContent = item.checked ? "✓" : "";
        el.querySelector(".item-name-check").style.textDecoration = item.checked ? "line-through" : "none";
      }

      updateProgress();
    }

    // ---- Check all items ----
    function checkAll() {
      guidedItems.forEach((item) => (item.checked = true));
      renderGuidedList();
      updateProgress();
    }

    // ---- Update progress bar ----
    function updateProgress() {
      const total = guidedItems.length;
      const checked = guidedItems.filter((i) => i.checked).length;
      const pct = total > 0 ? (checked / total) * 100 : 0;

      document.getElementById("shopping-progress-bar").style.width = pct + "%";
      document.getElementById("pt-count").textContent = checked + " / " + total;

      // Show finish card when all checked
      const finishCard = document.getElementById("finish-card");
      if (checked === total && total > 0) {
        finishCard.classList.add("show");
        if (checked === total && checked > 0) {
          showToast("🎉 ¡Compra completada! Todos los productos en el carrito.", "success");
        }
      } else {
        finishCard.classList.remove("show");
      }
    }
  </script>
</body>
</html>
