<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de la compra – Dietopia</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    /* ---- Shopping page styles ---- */
    .shopping-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      padding: var(--space-6) 0 var(--space-16);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-6);
      align-items: center;
    }

    .filter-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      color: var(--color-text-muted);
    }

    .filter-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .filter-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    /* Search input */
    .search-input-wrapper {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }

    .search-input-wrapper .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }

    .search-input-wrapper .form-input {
      padding-left: 36px;
    }

    /* Summary bar */
    .shopping-summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    @media (max-width: 600px) {
      .shopping-summary-bar { grid-template-columns: repeat(2, 1fr); }
    }

    .summary-stat {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      text-align: center;
      box-shadow: var(--shadow-card);
    }

    .summary-stat-value {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--color-primary);
    }

    .summary-stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* Category section */
    .category-section {
      margin-bottom: var(--space-6);
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg-alt);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
      cursor: pointer;
      user-select: none;
    }

    .category-header:hover {
      background: var(--color-primary-bg);
    }

    .category-title {
      font-weight: 700;
      font-size: var(--text-base);
      flex: 1;
    }

    .category-count {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .category-toggle {
      font-size: 0.8rem;
      transition: transform var(--transition-fast);
    }

    .category-toggle.open {
      transform: rotate(180deg);
    }

    /* Shopping item row */
    .shopping-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      margin-bottom: var(--space-2);
      transition: all var(--transition-fast);
    }

    .shopping-item:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-sm);
    }

    .shopping-item.owned {
      opacity: 0.55;
      background: var(--color-bg-alt);
    }

    .shopping-item.removed {
      display: none;
    }

    .item-emoji {
      font-size: 1.4rem;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-weight: 600;
      font-size: var(--text-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-qty {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .item-price {
      font-weight: 700;
      color: var(--color-primary);
      font-size: var(--text-base);
      flex-shrink: 0;
    }

    .item-price.crossed {
      text-decoration: line-through;
      color: var(--color-text-muted);
      font-weight: 400;
    }

    .item-actions {
      display: flex;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .item-btn {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      transition: all var(--transition-fast);
    }

    .item-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .item-btn.owned-btn.active {
      background: var(--color-primary-bg);
      border-color: var(--color-primary);
      color: var(--color-primary-dark);
    }

    .item-btn.remove-btn:hover {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }

    /* Alternatives popover */
    .alt-row {
      display: none;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      margin-top: -2px;
      margin-bottom: var(--space-2);
    }

    .alt-row.open {
      display: block;
    }

    .alt-row-title {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }

    .alt-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
      font-size: var(--text-sm);
    }

    .alt-option:hover {
      background: var(--color-primary-bg);
    }

    /* Optimize button */
    .optimize-section {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--color-bg) 70%, transparent);
      padding: var(--space-4) 0 var(--space-6);
      margin-top: var(--space-4);
    }

    .optimize-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .optimize-info h4 {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .optimize-info p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* Optimizing loading overlay */
    .optimizing-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      backdrop-filter: blur(4px);
    }

    .optimizing-overlay.show {
      display: flex;
    }
  </style>
</head>
<body class="shopping-page">

  <!-- Navbar -->
  <nav class="navbar">
    <div id="main-navbar"></div>
  </nav>

  <!-- Optimizing overlay -->
  <div class="optimizing-overlay" id="optimizing-overlay">
    <div class="spinner" style="width:50px;height:50px;border-width:5px;"></div>
    <div style="font-size:var(--text-xl); font-weight:700;">Optimizando tu compra...</div>
    <div id="opt-message" style="color:var(--color-text-muted); font-size:var(--text-sm);">Buscando los mejores precios</div>
  </div>

  <main class="main-content">
    <div class="container">

      <!-- Header -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-6); flex-wrap:wrap; gap:var(--space-3);">
        <div>
          <h1 style="font-size:var(--text-3xl); font-weight:800; margin-bottom:4px;">🛒 Lista de la compra</h1>
          <p style="color:var(--color-text-muted);">Ingredientes para tu plan semanal</p>
        </div>
        <div style="display:flex; gap:var(--space-3); flex-wrap:wrap;">
          <a href="guided-shopping.html" class="btn btn-outline btn-sm">🗺️ Compra guiada</a>
          <button class="btn btn-secondary btn-sm" onclick="resetList()">↩️ Restablecer</button>
        </div>
      </div>

      <!-- Summary stats -->
      <div class="shopping-summary-bar" id="summary-bar">
        <!-- Rendered by JS -->
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-input" id="search-input" placeholder="Buscar ingrediente..." oninput="filterItems()" />
        </div>
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this, 'all')">Todo</button>
        <button class="filter-btn" data-filter="pending" onclick="setFilter(this, 'pending')">Por comprar</button>
        <button class="filter-btn" data-filter="owned" onclick="setFilter(this, 'owned')">Ya tengo</button>
      </div>

      <!-- Shopping list by category -->
      <div id="shopping-list-container">
        <!-- Rendered by JS -->
      </div>

      <!-- Optimize section -->
      <div class="optimize-section">
        <div class="optimize-card">
          <div class="optimize-info">
            <h4>💡 Optimizar compra</h4>
            <p id="optimize-tip">Detectamos alternativas más económicas. Ahorra hasta <strong id="potential-savings">0€</strong>.</p>
          </div>
          <div style="display:flex; gap:var(--space-3); flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="optimizeShopping()">
              ✨ Optimizar ahora
            </button>
            <a href="guided-shopping.html" class="btn btn-outline">
              🗺️ Ir a compra guiada
            </a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="dietopia-toast"></div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    /**
     * Shopping page logic
     * Renders grouped shopping list with filter, remove, mark-owned, and optimize features
     */

    // Working copy of shopping list (allows modifications)
    let shoppingList = [];
    let currentFilter = "all";

    document.addEventListener("DOMContentLoaded", () => {
      if (!Storage.get("loggedIn")) {
        window.location.href = "login.html";
        return;
      }

      renderNavbar("shopping");

      // Load from storage or use default
      const saved = Storage.get("shoppingList");
      shoppingList = saved
        ? saved
        : JSON.parse(JSON.stringify(window.DietopiaData.SHOPPING_LIST));

      renderAll();
    });

    // ---- Render everything ----
    function renderAll() {
      renderSummary();
      renderList();
      updateOptimizeTip();
    }

    // ---- Summary stats ----
    function renderSummary() {
      const active = shoppingList.filter((i) => !i.removed);
      const owned = active.filter((i) => i.owned).length;
      const pending = active.filter((i) => !i.owned).length;
      const totalPrice = active.filter((i) => !i.owned).reduce((s, i) => s + i.price, 0);
      const savingsIfOpt = active
        .filter((i) => !i.owned && i.alternatives.length > 0)
        .reduce((s, i) => s + i.price * 0.18, 0);

      const bar = document.getElementById("summary-bar");
      bar.innerHTML = [
        { label: "Por comprar", value: pending, icon: "🛒" },
        { label: "Ya tengo", value: owned, icon: "✅" },
        { label: "Total estimado", value: "€" + totalPrice.toFixed(2), icon: "💶" },
        { label: "Ahorro posible", value: "€" + savingsIfOpt.toFixed(2), icon: "💡" },
      ]
        .map(
          (s) => `
          <div class="summary-stat">
            <div class="summary-stat-value">${s.icon} ${s.value}</div>
            <div class="summary-stat-label">${s.label}</div>
          </div>
        `
        )
        .join("");

      // Potential savings
      document.getElementById("potential-savings").textContent = "€" + savingsIfOpt.toFixed(2);
    }

    // ---- Render shopping list grouped by category ----
    function renderList() {
      const searchVal = (document.getElementById("search-input")?.value || "").toLowerCase();
      const container = document.getElementById("shopping-list-container");
      container.innerHTML = "";

      // Group items by category
      const categories = [...new Set(shoppingList.map((i) => i.category))];

      categories.forEach((cat) => {
        let items = shoppingList.filter(
          (i) => i.category === cat && !i.removed
        );

        // Apply filter
        if (currentFilter === "pending") items = items.filter((i) => !i.owned);
        if (currentFilter === "owned") items = items.filter((i) => i.owned);

        // Apply search
        if (searchVal) {
          items = items.filter((i) => i.name.toLowerCase().includes(searchVal));
        }

        if (items.length === 0) return;

        const section = document.createElement("div");
        section.className = "category-section";

        const header = document.createElement("div");
        header.className = "category-header";
        header.innerHTML = `
          <span>${getCategoryEmoji(cat)}</span>
          <span class="category-title">${cat}</span>
          <span class="category-count">${items.length} artículos</span>
          <span class="category-toggle open">▲</span>
        `;
        header.addEventListener("click", () => toggleCategory(header, itemsDiv));
        section.appendChild(header);

        const itemsDiv = document.createElement("div");
        items.forEach((item) => {
          itemsDiv.appendChild(buildItemRow(item));
        });
        section.appendChild(itemsDiv);
        container.appendChild(section);
      });
    }

    // ---- Build a single item row ----
    function buildItemRow(item) {
      const wrapper = document.createElement("div");

      const row = document.createElement("div");
      row.id = "item-" + item.id;
      row.className = "shopping-item" + (item.owned ? " owned" : "");

      const hasAlts = item.alternatives && item.alternatives.length > 0;

      row.innerHTML = `
        <div class="item-emoji">${item.emoji}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-qty">${item.qty}</div>
        </div>
        <div class="item-price ${item.owned ? "crossed" : ""}">€${item.price.toFixed(2)}</div>
        <div class="item-actions">
          ${hasAlts ? `<button class="item-btn" onclick="toggleAlts('${item.id}')">🔄</button>` : ""}
          <button class="item-btn owned-btn ${item.owned ? "active" : ""}" onclick="toggleOwned('${item.id}')">
            ${item.owned ? "✅" : "🏠"}
          </button>
          <button class="item-btn remove-btn" onclick="removeItem('${item.id}')">✕</button>
        </div>
      `;
      wrapper.appendChild(row);

      // Alternatives row
      if (hasAlts) {
        const altRow = document.createElement("div");
        altRow.id = "alt-" + item.id;
        altRow.className = "alt-row";
        altRow.innerHTML = `
          <div class="alt-row-title">💡 Alternativas más económicas:</div>
          ${item.alternatives.map((a, i) => `
            <div class="alt-option" onclick="selectAlt('${item.id}', ${i})">
              <span>${a}</span>
              <span class="badge badge-green">Elegir</span>
            </div>
          `).join("")}
        `;
        wrapper.appendChild(altRow);
      }

      return wrapper;
    }

    // ---- Toggle alternatives ----
    function toggleAlts(id) {
      const altRow = document.getElementById("alt-" + id);
      if (altRow) altRow.classList.toggle("open");
    }

    // ---- Select an alternative ----
    function selectAlt(id, altIndex) {
      const item = shoppingList.find((i) => i.id === id);
      if (!item) return;
      const altText = item.alternatives[altIndex];
      // Parse price from alt text (e.g. "Marca blanca: 0.55€/ud" → 0.55)
      const priceMatch = altText.match(/(\d+\.?\d*)[€]/);
      const newPrice = priceMatch ? parseFloat(priceMatch[1]) : item.price;

      item.alternatives = [];
      item.price = newPrice;

      showToast("✅ Alternativa seleccionada: " + altText, "success");
      saveAndRender();
    }

    // ---- Toggle owned status ----
    function toggleOwned(id) {
      const item = shoppingList.find((i) => i.id === id);
      if (!item) return;
      item.owned = !item.owned;
      showToast(item.owned ? "✅ Marcado como que ya lo tienes" : "Desmarcado", item.owned ? "success" : "default");
      saveAndRender();
    }

    // ---- Remove item ----
    function removeItem(id) {
      const item = shoppingList.find((i) => i.id === id);
      if (!item) return;
      item.removed = true;
      showToast("❌ " + item.name + " eliminado de la lista", "warning");
      saveAndRender();
    }

    // ---- Reset list ----
    function resetList() {
      shoppingList = JSON.parse(JSON.stringify(window.DietopiaData.SHOPPING_LIST));
      Storage.remove("shoppingList");
      showToast("↩️ Lista restablecida", "default");
      renderAll();
    }

    // ---- Filter ----
    function setFilter(btn, filter) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      renderList();
    }

    function filterItems() {
      renderList();
    }

    // ---- Toggle category collapse ----
    function toggleCategory(header, itemsDiv) {
      const toggle = header.querySelector(".category-toggle");
      const isOpen = toggle.classList.contains("open");
      toggle.classList.toggle("open", !isOpen);
      itemsDiv.style.display = isOpen ? "none" : "block";
    }

    // ---- Category emoji helper ----
    function getCategoryEmoji(cat) {
      const map = {
        "Frutas y Verduras": "🥦",
        "Proteínas": "🍗",
        "Cereales y Legumbres": "🌾",
        "Despensa": "🫙",
      };
      return map[cat] || "📦";
    }

    // ---- Update optimize tip ----
    function updateOptimizeTip() {
      const itemsWithAlts = shoppingList.filter((i) => !i.removed && !i.owned && i.alternatives.length > 0);
      const savings = itemsWithAlts.reduce((s, i) => s + i.price * 0.18, 0);
      document.getElementById("potential-savings").textContent = "€" + savings.toFixed(2);
    }

    // ---- Optimize shopping simulation ----
    function optimizeShopping() {
      const overlay = document.getElementById("optimizing-overlay");
      const msgEl = document.getElementById("opt-message");
      overlay.classList.add("show");

      const messages = [
        "Buscando los mejores precios...",
        "Comparando supermercados...",
        "Aplicando alternativas económicas...",
        "Calculando ahorro total...",
      ];

      let idx = 0;
      const msgInterval = setInterval(() => {
        idx++;
        if (idx < messages.length) {
          msgEl.textContent = messages[idx];
        }
      }, 800);

      setTimeout(() => {
        clearInterval(msgInterval);
        overlay.classList.remove("show");

        // Apply "cheaper" alternatives to all eligible items
        let totalSaved = 0;
        shoppingList.forEach((item) => {
          if (item.removed || item.owned || item.alternatives.length === 0) return;
          const firstAlt = item.alternatives[0];
          const priceMatch = firstAlt.match(/(\d+\.?\d*)[€]/);
          if (priceMatch) {
            const oldPrice = item.price;
            const newPrice = parseFloat(priceMatch[1]);
            if (newPrice < oldPrice) {
              totalSaved += oldPrice - newPrice;
              item.price = newPrice;
              item.alternatives = [];
            }
          }
        });

        showToast(
          "💰 Compra optimizada. Ahorro: €" + totalSaved.toFixed(2),
          "success",
          4000
        );
        saveAndRender();
      }, 3500);
    }

    // ---- Save and re-render ----
    function saveAndRender() {
      Storage.set("shoppingList", shoppingList);
      renderAll();
    }
  </script>
</body>
</html>
