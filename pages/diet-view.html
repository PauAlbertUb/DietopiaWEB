<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Dieta – Dietopia</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    /* ---- Diet view page styles ---- */
    .diet-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      padding: var(--space-6) 0 var(--space-16);
    }

    /* Week selector */
    .week-bar {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--color-border);
    }

    .week-bar::-webkit-scrollbar { display: none; }

    .day-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      flex-shrink: 0;
      border: 2px solid transparent;
      min-width: 72px;
    }

    .day-tab:hover {
      background: var(--color-primary-bg);
    }

    .day-tab.active {
      background: var(--color-primary-bg);
      border-color: var(--color-primary);
    }

    .day-tab-name {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
    }

    .day-tab.active .day-tab-name {
      color: var(--color-primary-dark);
    }

    .day-tab-date {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-text);
    }

    .day-tab-kcal {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    /* Daily summary banner */
    .day-summary-bar {
      background: var(--color-primary-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .day-summary-title {
      font-size: var(--text-lg);
      font-weight: 700;
    }

    .day-macro-pills {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .macro-pill {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Meal cards grid */
    .meals-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
    }

    @media (max-width: 640px) {
      .meals-grid { grid-template-columns: 1fr; }
    }

    .meal-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: all var(--transition-base);
    }

    .meal-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .meal-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg-alt);
      border-bottom: 1px solid var(--color-border);
    }

    .meal-type-label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
    }

    .meal-time-chip {
      font-size: var(--text-xs);
      color: var(--color-text-light);
    }

    .meal-card-body {
      padding: var(--space-4);
      cursor: pointer;
    }

    .meal-emoji-large {
      font-size: 3rem;
      display: block;
      text-align: center;
      margin-bottom: var(--space-3);
    }

    .meal-card-name {
      font-size: var(--text-base);
      font-weight: 700;
      text-align: center;
      margin-bottom: var(--space-2);
    }

    .meal-card-kcal {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: var(--space-3);
    }

    .meal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
      justify-content: center;
      margin-bottom: var(--space-3);
    }

    .meal-macros-mini {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .meal-card-footer {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: var(--space-2);
      justify-content: center;
    }

    /* Meal detail modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      max-width: 520px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--color-bg-alt);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background var(--transition-fast);
    }

    .modal-close:hover {
      background: var(--color-border);
    }

    .modal-body {
      padding: var(--space-6);
    }

    .recipe-emoji {
      font-size: 4rem;
      text-align: center;
      display: block;
      margin-bottom: var(--space-4);
    }

    .recipe-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin: var(--space-5) 0;
    }

    .macro-box {
      background: var(--color-bg);
      border-radius: var(--radius-sm);
      padding: var(--space-3);
      text-align: center;
    }

    .macro-value {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--color-primary);
    }

    .macro-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .ingredients-list {
      list-style: disc;
      padding-left: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .ingredients-list li {
      font-size: var(--text-sm);
      color: var(--color-text);
    }

    .recipe-steps {
      background: var(--color-bg);
      border-radius: var(--radius-sm);
      padding: var(--space-4);
      font-size: var(--text-sm);
      line-height: 1.7;
      color: var(--color-text);
    }

    /* Replace meal panel */
    .replace-panel {
      display: none;
    }

    .replace-panel.open {
      display: block;
    }

    .alt-meal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    .alt-meal-card {
      padding: var(--space-3) var(--space-4);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .alt-meal-card:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-bg);
    }

    .alt-meal-emoji { font-size: 1.5rem; margin-bottom: 4px; }
    .alt-meal-name { font-size: var(--text-sm); font-weight: 600; }
    .alt-meal-kcal { font-size: var(--text-xs); color: var(--color-text-muted); }

    /* Weekly summary bar at top */
    .weekly-summary {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-6);
      margin-bottom: var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
      box-shadow: var(--shadow-card);
    }

    .weekly-summary-info h2 {
      font-size: var(--text-xl);
      font-weight: 800;
      margin-bottom: 4px;
    }

    .weekly-summary-info p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body class="diet-page">

  <!-- Navbar -->
  <nav class="navbar">
    <div id="main-navbar"></div>
  </nav>

  <main class="main-content">
    <div class="container">

      <!-- Page header + actions -->
      <div class="weekly-summary">
        <div class="weekly-summary-info">
          <h2>🥗 Mi Dieta Semanal</h2>
          <p id="week-label">Cargando...</p>
        </div>
        <div style="display:flex; gap:var(--space-3); flex-wrap:wrap;">
          <a href="diet-generation.html" class="btn btn-outline btn-sm">🔄 Regenerar</a>
          <a href="shopping.html" class="btn btn-primary btn-sm">🛒 Ver compra</a>
        </div>
      </div>

      <!-- Day selector tabs -->
      <div class="week-bar" id="week-bar">
        <!-- Rendered by JS -->
      </div>

      <!-- Day summary bar -->
      <div class="day-summary-bar" id="day-summary-bar">
        <!-- Rendered by JS -->
      </div>

      <!-- Meals grid for selected day -->
      <div class="meals-grid" id="meals-grid">
        <!-- Rendered by JS -->
      </div>

    </div>
  </main>

  <!-- Meal Detail Modal -->
  <div class="modal-overlay" id="meal-modal" onclick="closeMealModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div id="modal-meal-type" style="font-size:0.75rem; font-weight:700; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:0.05em;"></div>
          <h3 id="modal-meal-name"></h3>
        </div>
        <button class="modal-close" onclick="closeMealModal()">✕</button>
      </div>
      <div class="modal-body">
        <span class="recipe-emoji" id="modal-emoji"></span>

        <!-- Macros -->
        <div class="recipe-macros" id="modal-macros">
          <!-- Rendered by JS -->
        </div>

        <!-- Tags -->
        <div class="meal-tags" id="modal-tags" style="margin-bottom:var(--space-4);"></div>

        <!-- Ingredients -->
        <h4 style="font-weight:700; margin-bottom:var(--space-3);">🥕 Ingredientes</h4>
        <ul class="ingredients-list" id="modal-ingredients"></ul>

        <!-- Recipe -->
        <h4 style="font-weight:700; margin:var(--space-4) 0 var(--space-3);">👨‍🍳 Preparación</h4>
        <div class="recipe-steps" id="modal-recipe"></div>

        <hr class="divider" />

        <!-- View / replace actions -->
        <div style="display:flex; gap:var(--space-3); justify-content:center; margin-bottom:var(--space-4);">
          <button class="btn btn-outline" onclick="showReplacePanel()">🔄 Reemplazar comida</button>
          <button class="btn btn-secondary" onclick="closeMealModal()">Cerrar</button>
        </div>

        <!-- Replace panel -->
        <div class="replace-panel" id="replace-panel">
          <h4 style="font-weight:700; margin-bottom:var(--space-2);">Elige una alternativa</h4>
          <p style="font-size:var(--text-sm); color:var(--color-text-muted); margin-bottom:var(--space-3);">Opciones con nutrición similar</p>
          <div class="alt-meal-grid" id="alt-meals-grid">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="dietopia-toast"></div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    /**
     * Diet View page logic
     * Renders weekly plan with clickable meal cards and detail modal
     */

    let activeDayIndex = 0;
    let currentMealContext = null; // { dayIndex, mealType }

    document.addEventListener("DOMContentLoaded", () => {
      if (!Storage.get("loggedIn")) {
        window.location.href = "login.html";
        return;
      }

      renderNavbar("diet");

      const { MEAL_PLAN } = window.DietopiaData;

      // Set week label
      document.getElementById("week-label").textContent = "Semana " + MEAL_PLAN.week;

      // ---- Render day tabs ----
      const weekBar = document.getElementById("week-bar");
      MEAL_PLAN.days.forEach((day, i) => {
        const totalKcal = Object.values(day.meals).reduce((sum, m) => sum + m.calories, 0);
        const tab = document.createElement("div");
        tab.className = "day-tab" + (i === 0 ? " active" : "");
        tab.dataset.index = i;
        tab.innerHTML = `
          <div class="day-tab-name">${day.day.substring(0, 3)}</div>
          <div class="day-tab-date">${day.date.split(" ")[0]}</div>
          <div class="day-tab-kcal">${totalKcal} kcal</div>
        `;
        tab.addEventListener("click", () => selectDay(i));
        weekBar.appendChild(tab);
      });

      // ---- Initial render ----
      renderDay(0);
    });

    // ---- Select a day ----
    function selectDay(index) {
      // Update active tab
      document.querySelectorAll(".day-tab").forEach((t, i) => {
        t.classList.toggle("active", i === index);
      });
      activeDayIndex = index;
      renderDay(index);
    }

    // ---- Render meals for selected day ----
    function renderDay(index) {
      const { MEAL_PLAN } = window.DietopiaData;
      const day = MEAL_PLAN.days[index];

      // Day summary
      const totalKcal = Object.values(day.meals).reduce((sum, m) => sum + m.calories, 0);
      const totalProtein = Object.values(day.meals).reduce((sum, m) => sum + m.macros.protein, 0);
      const totalCarbs = Object.values(day.meals).reduce((sum, m) => sum + m.macros.carbs, 0);
      const totalFat = Object.values(day.meals).reduce((sum, m) => sum + m.macros.fat, 0);

      document.getElementById("day-summary-bar").innerHTML = `
        <div class="day-summary-title">${day.day}, ${day.date}</div>
        <div class="day-macro-pills">
          <div class="macro-pill">🔥 ${totalKcal} kcal</div>
          <div class="macro-pill">💪 ${totalProtein}g proteína</div>
          <div class="macro-pill">🌾 ${totalCarbs}g carbos</div>
          <div class="macro-pill">🫒 ${totalFat}g grasas</div>
        </div>
      `;

      // Meal cards
      const mealTypes = [
        { key: "breakfast", label: "Desayuno" },
        { key: "lunch", label: "Comida" },
        { key: "snack", label: "Merienda" },
        { key: "dinner", label: "Cena" },
      ];

      const grid = document.getElementById("meals-grid");
      grid.innerHTML = "";

      mealTypes.forEach(({ key, label }) => {
        const meal = day.meals[key];
        if (!meal) return;

        const card = document.createElement("div");
        card.className = "meal-card";

        const tags = meal.tags.map((t) => `<span class="badge badge-green">${t}</span>`).join("");

        card.innerHTML = `
          <div class="meal-card-header">
            <span class="meal-type-label">${label}</span>
            <span class="meal-time-chip">${meal.time}</span>
          </div>
          <div class="meal-card-body" onclick="openMealModal(${index}, '${key}')">
            <span class="meal-emoji-large">${meal.emoji}</span>
            <div class="meal-card-name">${meal.name}</div>
            <div class="meal-card-kcal">${meal.calories} kcal</div>
            <div class="meal-tags">${tags}</div>
            <div class="meal-macros-mini">
              <span>💪 ${meal.macros.protein}g</span>
              <span>🌾 ${meal.macros.carbs}g</span>
              <span>🫒 ${meal.macros.fat}g</span>
            </div>
          </div>
          <div class="meal-card-footer">
            <button class="btn btn-sm btn-outline" onclick="openMealModal(${index}, '${key}')">Ver receta</button>
            <button class="btn btn-sm btn-secondary" onclick="openMealModal(${index}, '${key}', true)">🔄</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // ---- Open meal modal ----
    function openMealModal(dayIndex, mealType, openReplace = false) {
      const { MEAL_PLAN } = window.DietopiaData;
      const meal = MEAL_PLAN.days[dayIndex].meals[mealType];
      const mealTypeLabels = {
        breakfast: "Desayuno",
        lunch: "Comida",
        snack: "Merienda",
        dinner: "Cena",
      };

      currentMealContext = { dayIndex, mealType };

      document.getElementById("modal-meal-type").textContent = mealTypeLabels[mealType];
      document.getElementById("modal-meal-name").textContent = meal.name;
      document.getElementById("modal-emoji").textContent = meal.emoji;

      // Macros
      const macrosEl = document.getElementById("modal-macros");
      macrosEl.innerHTML = [
        { label: "Calorías", value: meal.calories, unit: "kcal" },
        { label: "Proteína", value: meal.macros.protein, unit: "g" },
        { label: "Carbos", value: meal.macros.carbs, unit: "g" },
        { label: "Grasas", value: meal.macros.fat, unit: "g" },
      ]
        .map(
          (m) => `
          <div class="macro-box">
            <div class="macro-value">${m.value}<small style="font-size:0.6em;">${m.unit}</small></div>
            <div class="macro-label">${m.label}</div>
          </div>
        `
        )
        .join("");

      // Tags
      document.getElementById("modal-tags").innerHTML = meal.tags
        .map((t) => `<span class="badge badge-green">${t}</span>`)
        .join("");

      // Ingredients
      const ingredientsEl = document.getElementById("modal-ingredients");
      ingredientsEl.innerHTML = meal.ingredients.map((i) => `<li>${i}</li>`).join("");

      // Recipe
      document.getElementById("modal-recipe").textContent = meal.recipe;

      // Alternatives
      renderAlternatives();

      // Open/close replace panel
      document.getElementById("replace-panel").classList.toggle("open", openReplace);

      // Open modal
      document.getElementById("meal-modal").classList.add("open");
    }

    // ---- Close modal ----
    function closeMealModal(event) {
      if (event && event.target !== document.getElementById("meal-modal")) return;
      document.getElementById("meal-modal").classList.remove("open");
      document.getElementById("replace-panel").classList.remove("open");
    }

    // ---- Show replace panel ----
    function showReplacePanel() {
      document.getElementById("replace-panel").classList.toggle("open");
    }

    // ---- Render alternative meals ----
    function renderAlternatives() {
      const { ALTERNATIVE_MEALS } = window.DietopiaData;
      const grid = document.getElementById("alt-meals-grid");
      grid.innerHTML = ALTERNATIVE_MEALS.slice(0, 4)
        .map(
          (alt) => `
          <div class="alt-meal-card" onclick="replaceMeal('${alt.id}', '${alt.name}', '${alt.emoji}', ${alt.calories})">
            <div class="alt-meal-emoji">${alt.emoji}</div>
            <div class="alt-meal-name">${alt.name}</div>
            <div class="alt-meal-kcal">${alt.calories} kcal · ${alt.tags[0]}</div>
          </div>
        `
        )
        .join("");
    }

    // ---- Replace a meal ----
    function replaceMeal(altId, name, emoji, calories) {
      if (!currentMealContext) return;
      const { MEAL_PLAN } = window.DietopiaData;
      const { dayIndex, mealType } = currentMealContext;

      // Update meal data
      MEAL_PLAN.days[dayIndex].meals[mealType].name = name;
      MEAL_PLAN.days[dayIndex].meals[mealType].emoji = emoji;
      MEAL_PLAN.days[dayIndex].meals[mealType].calories = calories;

      showToast("✅ Comida reemplazada por " + name, "success");

      // Close modal and re-render
      document.getElementById("meal-modal").classList.remove("open");
      renderDay(dayIndex);
    }

    // ---- Close modal on Escape ----
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        document.getElementById("meal-modal").classList.remove("open");
      }
    });
  </script>
</body>
</html>
